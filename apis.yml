aid: ready-player-me
url: https://raw.githubusercontent.com/api-evangelist/ready-player-me/refs/heads/main/apis.yml
apis:
  - aid: ready-player-me:ready-player-me-avatars-api
    name: Ready Player Me Avatars API
    tags:
      - Avatars
      - 3D
      - GLB
      - Gaming
    humanURL: https://docs.readyplayer.me/ready-player-me/api-reference
    baseURL: https://api.readyplayer.me/
    properties:
      - url: https://docs.readyplayer.me/ready-player-me/api-reference
        type: Documentation
      - url: openapi/ready-player-me-avatars-api-openapi.yml
        type: OpenAPI
    description: >-
      Create, retrieve, update, and delete Ready Player Me cross-platform avatars. Includes template-based creation,
      asset equipping, draft management, color palette discovery, and binary glTF (.glb) plus 2D PNG renders used in
      Unity, Unreal, web, iOS, and Android. Supports A/T-pose, mesh LODs, texture atlases, ARKit / Oculus morph targets,
      Draco and Meshopt compression.
  - aid: ready-player-me:ready-player-me-assets-api
    name: Ready Player Me Assets API
    tags:
      - Assets
      - Wearables
      - 3D
      - Gaming
    humanURL: https://docs.readyplayer.me/ready-player-me/api-reference/rest-api/assets
    baseURL: https://api.readyplayer.me/
    properties:
      - url: https://docs.readyplayer.me/ready-player-me/api-reference/rest-api/assets
        type: Documentation
      - url: openapi/ready-player-me-assets-api-openapi.yml
        type: OpenAPI
    description: >-
      Discover and retrieve avatar wearable assets — hair, outfits, headwear, glasses, facewear, footwear, beards,
      costumes, and custom assets — scoped to an application and optionally filtered to those viewable or usable by a
      specific user. Powers the wardrobe surface of the Ready Player Me Avatar Creator.
  - aid: ready-player-me:ready-player-me-auth-api
    name: Ready Player Me Auth API
    tags:
      - Authentication
      - Identity
      - Users
    humanURL: https://docs.readyplayer.me/ready-player-me/api-reference/rest-api/users
    baseURL: https://api.readyplayer.me/
    properties:
      - url: https://docs.readyplayer.me/ready-player-me/api-reference/rest-api/users
        type: Documentation
      - url: openapi/ready-player-me-auth-api-openapi.yml
        type: OpenAPI
    description: >-
      Anonymous user creation, email-code login, token refresh, and avatar access tokens used by the Ready Player Me
      Avatar Creator and SDKs. Authentication runs through each application's per-studio subdomain.
